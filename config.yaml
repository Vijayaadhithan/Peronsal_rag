app_name: Local Data Assistant
collection_name: local_data
#gemma3:1b
llm:
  model: gemma4:12b
  temperature: 0.2
  think: false

query_extraction:
  model: gemma4:12b
  temperature: 0

embedding:
  model: embeddinggemma:latest
  similarity: cosine
  normalize: true

chunking:
  chunk_size: 512
  chunk_overlap: 80

retrieval:
  vector_candidate_k: 100
  vector_top_k: 30
  bm25_top_k: 30
  final_top_k: 10
  reranker_model: BAAI/bge-reranker-large
  reranker_batch_size: 4
  reranker_max_length: 512
  reranker_use_fp16: false
